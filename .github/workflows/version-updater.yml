name: Version Updater

on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install pipoca
        run: bun add -g pipoca

      - name: Configure git
        run: git config --global user.name 'github-actions[bot]' && git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run pipoca
        run: bunx pipoca update package.json

      - name: Push
        run: |
          git add package.json
          git diff --staged --quiet || git commit -m "[Automated] Update version"
          git push origin HEAD